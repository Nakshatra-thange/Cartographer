[package]
name = "cartographer-cli"
version = "0.1.0"
edition = "2021"

[dependencies]
git2 = "0.18"
walkdir = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
tree-sitter = "0.22"
tree-sitter-javascript = "0.21"
tree-sitter-typescript = "0.21"
regex = "1"